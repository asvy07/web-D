<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS BOX MODEL </title>
    <style>
        .box{
            background-color: rgba(0, 208, 255, 0.259);
        }
        .box1{
            color:rgb(10, 50, 126);
            padding: 10px;
            margin: 20px;
            border: 5px solid black;
            height: 200px;
            box-sizing: border-box;
             
        }
        .box2{
            color: brown;
            padding: 10px;
            margin: 20px;
            border: 5px solid rgb(185, 10, 10);
            height: 200px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="box box1">I am a box!!</div>
    <div class="box box2">I am another box!!</div>
</body>
</html>
